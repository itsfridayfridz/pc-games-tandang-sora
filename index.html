<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PC Game Drive Builder</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&amp;family=Rajdhani:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    
    .font-orbitron { font-family: 'Orbitron', monospace; }
    .font-rajdhani { font-family: 'Rajdhani', sans-serif; }
    
    .game-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    
    .game-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transition: left 0.5s;
    }
    
    .game-card:hover::before {
      left: 100%;
    }
    
    .game-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 0 30px rgba(255,255,255,0.1);
    }
    
    .btn-primary {
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }
    
    .btn-primary::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }
    
    .btn-primary:hover::after {
      width: 300px;
      height: 300px;
    }
    
    .filter-btn {
      transition: all 0.2s ease;
    }
    
    .filter-btn.active {
      background: white;
      color: black;
    }
    
    .storage-bar {
      background: linear-gradient(90deg, #1a1a1a 0%, #2a2a2a 100%);
      position: relative;
      overflow: hidden;
    }
    
    .storage-fill {
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      background: linear-gradient(90deg, #ffffff 0%, #cccccc 100%);
    }
    
    .glow-text {
      text-shadow: 0 0 10px rgba(255,255,255,0.3);
    }
    
    .selected-item {
      animation: slideIn 0.3s ease;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    .toast {
      animation: toastSlide 0.3s ease;
    }
    
    @keyframes toastSlide {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    ::-webkit-scrollbar {
      width: 6px;
    }
    
    ::-webkit-scrollbar-track {
      background: #1a1a1a;
    }
    
    ::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 3px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #666;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-black text-white font-rajdhani overflow-auto">
  <div id="app" class="min-h-full w-full"><!-- Header -->
   <header class="border-b border-white/10 bg-black/80 backdrop-blur-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-6">
     <div class="flex items-center justify-between">
      <div>
       <h1 id="main-title" class="text-3xl md:text-4xl font-orbitron font-bold tracking-wider glow-text">BUILD YOUR GAME DRIVE</h1>
       <p id="subtitle" class="text-white/50 text-sm mt-1 tracking-wide">Plan your perfect gaming setup</p>
      </div>
      <div class="hidden md:flex items-center gap-2">
       <div class="w-2 h-2 bg-white rounded-full animate-pulse"></div><span class="text-xs text-white/50 font-medium">ONLINE</span>
      </div>
     </div>
    </div>
   </header>
   <main class="max-w-7xl mx-auto px-4 py-8">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8"><!-- Left Column - Games -->
     <div class="lg:col-span-2 space-y-6"><!-- Category Filters -->
      <div class="bg-white/5 border border-white/10 rounded-lg p-4">
       <h3 class="text-xs font-orbitron text-white/50 mb-3 tracking-widest">FILTER BY CATEGORY</h3>
       <div id="filters" class="flex flex-wrap gap-2"><button class="filter-btn active px-4 py-2 text-sm border border-white/20 rounded bg-white text-black font-medium transition-all hover:bg-white/90" data-category="all">All Games</button> <button class="filter-btn px-4 py-2 text-sm border border-white/20 rounded bg-transparent text-white font-medium transition-all hover:bg-white/10" data-category="2 Player">2 Player</button> <button class="filter-btn px-4 py-2 text-sm border border-white/20 rounded bg-transparent text-white font-medium transition-all hover:bg-white/10" data-category="Horror">Horror</button> <button class="filter-btn px-4 py-2 text-sm border border-white/20 rounded bg-transparent text-white font-medium transition-all hover:bg-white/10" data-category="Adventure">Adventure</button> <button class="filter-btn px-4 py-2 text-sm border border-white/20 rounded bg-transparent text-white font-medium transition-all hover:bg-white/10" data-category="Action">Action</button> <button class="filter-btn px-4 py-2 text-sm border border-white/20 rounded bg-transparent text-white font-medium transition-all hover:bg-white/10" data-category="Racing">Racing</button> <button class="filter-btn px-4 py-2 text-sm border border-white/20 rounded bg-transparent text-white font-medium transition-all hover:bg-white/10" data-category="RPG">RPG</button> <button class="filter-btn px-4 py-2 text-sm border border-white/20 rounded bg-transparent text-white font-medium transition-all hover:bg-white/10" data-category="Open World">Open World</button>
       </div>
      </div><!-- Game Grid -->
      <div>
       <div class="flex items-center justify-between mb-4">
        <h3 class="text-xs font-orbitron text-white/50 tracking-widest">AVAILABLE GAMES</h3><span id="game-count" class="text-xs text-white/30">12 games</span>
       </div>
       <div id="games-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4"><!-- Games populated by JS -->
       </div>
      </div>
     </div><!-- Right Column - Calculator & Selected -->
     <div class="space-y-6"><!-- Storage Calculator -->
      <div class="bg-white/5 border border-white/10 rounded-lg p-5">
       <h3 class="text-xs font-orbitron text-white/50 mb-4 tracking-widest">STORAGE CALCULATOR</h3><!-- Drive Size Selector -->
       <div class="mb-5"><label class="text-sm text-white/70 mb-2 block">Select Drive Size</label>
        <div id="drive-selector" class="grid grid-cols-3 gap-2"><button class="drive-btn px-3 py-2 text-sm border border-white/20 rounded bg-transparent text-white font-medium transition-all hover:bg-white/10" data-size="500" data-usable="460">500GB</button> <button class="drive-btn active px-3 py-2 text-sm border border-white/20 rounded bg-white text-black font-medium" data-size="1000" data-usable="930">1TB</button> <button class="drive-btn px-3 py-2 text-sm border border-white/20 rounded bg-transparent text-white font-medium transition-all hover:bg-white/10" data-size="2000" data-usable="1800">2TB</button> <button class="drive-btn px-3 py-2 text-sm border border-white/20 rounded bg-transparent text-white font-medium transition-all hover:bg-white/10" data-size="4000" data-usable="3600">4TB</button> <button class="drive-btn px-3 py-2 text-sm border border-white/20 rounded bg-transparent text-white font-medium transition-all hover:bg-white/10" data-size="6000" data-usable="5450">6TB</button> <button class="drive-btn px-3 py-2 text-sm border border-white/20 rounded bg-transparent text-white font-medium transition-all hover:bg-white/10" data-size="8000" data-usable="7270">8TB</button>
        </div>
       </div><!-- Storage Bar -->
       <div class="mb-5">
        <div class="storage-bar h-4 rounded-full overflow-hidden">
         <div id="storage-fill" class="storage-fill h-full rounded-full" style="width: 0%"></div>
        </div>
       </div><!-- Storage Stats -->
       <div class="space-y-3">
        <div class="flex justify-between items-center py-2 border-b border-white/10"><span class="text-white/50 text-sm">Selected Drive</span> <span id="drive-display" class="font-orbitron font-bold">1TB</span>
        </div>
        <div class="flex justify-between items-center py-2 border-b border-white/10"><span class="text-white/50 text-sm">Usable Space</span> <span id="usable-display" class="font-orbitron text-white/70">930 GB</span>
        </div>
        <div class="flex justify-between items-center py-2 border-b border-white/10"><span class="text-white/50 text-sm">Used Space</span> <span id="used-display" class="font-orbitron text-white">0 GB</span>
        </div>
        <div class="flex justify-between items-center py-2"><span class="text-white/50 text-sm">Remaining Space</span> <span id="remaining-display" class="font-orbitron text-green-400">930 GB</span>
        </div>
       </div>
      </div><!-- Selected Games -->
      <div class="bg-white/5 border border-white/10 rounded-lg p-5">
       <div class="flex items-center justify-between mb-4">
        <h3 class="text-xs font-orbitron text-white/50 tracking-widest">SELECTED GAMES</h3><span id="selected-count" class="text-xs bg-white/10 px-2 py-1 rounded">0</span>
       </div>
       <div id="selected-list" class="space-y-2 max-h-64 overflow-y-auto mb-4">
        <p id="empty-message" class="text-white/30 text-sm text-center py-8">No games selected</p>
       </div><!-- Total -->
       <div class="border-t border-white/10 pt-4 mb-4">
        <div class="flex justify-between items-center"><span class="font-orbitron text-sm">TOTAL SIZE</span> <span id="total-size" class="font-orbitron font-bold text-xl">0 GB</span>
        </div>
       </div><!-- Action Buttons -->
       <div class="space-y-2"><button id="clear-btn" class="btn-primary w-full py-3 border border-white/20 rounded font-orbitron text-sm tracking-wider hover:bg-white/10 transition-all disabled:opacity-30 disabled:cursor-not-allowed" disabled> CLEAR LIST </button> <button id="send-btn" class="btn-primary w-full py-3 bg-white text-black rounded font-orbitron text-sm tracking-wider hover:bg-white/90 transition-all disabled:opacity-30 disabled:cursor-not-allowed flex items-center justify-center gap-2" disabled>
         <svg class="w-4 h-4" fill="currentColor" viewbox="0 0 24 24">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
         </svg> SEND TO MESSENGER </button>
       </div>
      </div>
     </div>
    </div>
   </main><!-- Toast Container -->
   <div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2"></div>
  </div>
  <script>
    // Game data
    const games = [
      { id: 1, title: "Resident Evil 4", category: "Horror", size: 67, image: "🎮" },
      { id: 2, title: "It Takes Two", category: "2 Player", size: 51, image: "👥" },
      { id: 3, title: "Elden Ring", category: "RPG", size: 60, image: "⚔️" },
      { id: 4, title: "GTA V", category: "Open World", size: 95, image: "🌆" },
      { id: 5, title: "Forza Horizon 5", category: "Racing", size: 110, image: "🏎️" },
      { id: 6, title: "God of War", category: "Action", size: 70, image: "🪓" },
      { id: 7, title: "Uncharted 4", category: "Adventure", size: 55, image: "🗺️" },
      { id: 8, title: "A Way Out", category: "2 Player", size: 25, image: "🚔" },
      { id: 9, title: "Silent Hill 2", category: "Horror", size: 50, image: "👻" },
      { id: 10, title: "Cyberpunk 2077", category: "Open World", size: 70, image: "🤖" },
      { id: 11, title: "Need for Speed Heat", category: "Racing", size: 40, image: "🚗" },
      { id: 12, title: "Baldur's Gate 3", category: "RPG", size: 120, image: "🐉" },
      { id: 13, title: "Devil May Cry 5", category: "Action", size: 45, image: "😈" },
      { id: 14, title: "Tomb Raider", category: "Adventure", size: 35, image: "🏛️" },
      { id: 15, title: "Overcooked 2", category: "2 Player", size: 8, image: "🍳" },
      { id: 16, title: "Outlast", category: "Horror", size: 5, image: "📹" }
    ];

    // Default config
    const defaultConfig = {
      main_title: "BUILD YOUR GAME DRIVE",
      subtitle: "Plan your perfect gaming setup",
      background_color: "#000000",
      surface_color: "#1a1a1a",
      text_color: "#ffffff",
      primary_action_color: "#ffffff",
      secondary_action_color: "#666666"
    };

    // State
    let selectedGames = [];
    let currentFilter = "all";
    let currentDrive = { size: 1000, usable: 930, label: "1TB" };

    // Initialize Element SDK
    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        const mainTitle = document.getElementById('main-title');
        const subtitle = document.getElementById('subtitle');
        
        if (mainTitle) mainTitle.textContent = config.main_title || defaultConfig.main_title;
        if (subtitle) subtitle.textContent = config.subtitle || defaultConfig.subtitle;
        
        document.body.style.backgroundColor = config.background_color || defaultConfig.background_color;
        document.body.style.color = config.text_color || defaultConfig.text_color;
      },
      mapToCapabilities: (config) => ({
        recolorables: [
          {
            get: () => config.background_color || defaultConfig.background_color,
            set: (value) => window.elementSdk.setConfig({ background_color: value })
          },
          {
            get: () => config.surface_color || defaultConfig.surface_color,
            set: (value) => window.elementSdk.setConfig({ surface_color: value })
          },
          {
            get: () => config.text_color || defaultConfig.text_color,
            set: (value) => window.elementSdk.setConfig({ text_color: value })
          },
          {
            get: () => config.primary_action_color || defaultConfig.primary_action_color,
            set: (value) => window.elementSdk.setConfig({ primary_action_color: value })
          },
          {
            get: () => config.secondary_action_color || defaultConfig.secondary_action_color,
            set: (value) => window.elementSdk.setConfig({ secondary_action_color: value })
          }
        ],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      }),
      mapToEditPanelValues: (config) => new Map([
        ["main_title", config.main_title || defaultConfig.main_title],
        ["subtitle", config.subtitle || defaultConfig.subtitle]
      ])
    });

    // Render games
    function renderGames() {
      const grid = document.getElementById('games-grid');
      const filteredGames = currentFilter === "all" 
        ? games 
        : games.filter(g => g.category === currentFilter);
      
      document.getElementById('game-count').textContent = `${filteredGames.length} games`;
      
      grid.innerHTML = filteredGames.map(game => {
        const isSelected = selectedGames.find(g => g.id === game.id);
        return `
          <div class="game-card bg-white/5 border border-white/10 rounded-lg overflow-hidden ${isSelected ? 'ring-2 ring-white' : ''}">
            <div class="aspect-[3/4] bg-gradient-to-br from-white/10 to-white/5 flex items-center justify-center text-4xl">
              ${game.image}
            </div>
            <div class="p-3">
              <h4 class="font-orbitron text-xs font-bold truncate mb-1">${game.title}</h4>
              <div class="flex items-center justify-between mb-2">
                <span class="text-[10px] px-2 py-0.5 bg-white/10 rounded text-white/60">${game.category}</span>
                <span class="text-xs font-bold">${game.size} GB</span>
              </div>
              <button 
                class="w-full py-2 text-xs font-orbitron tracking-wider rounded transition-all ${isSelected 
                  ? 'bg-white/20 text-white border border-white/30' 
                  : 'bg-white text-black hover:bg-white/90'}"
                onclick="toggleGame(${game.id})"
              >
                ${isSelected ? 'REMOVE' : 'ADD TO DRIVE'}
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    // Toggle game selection
    function toggleGame(id) {
      const game = games.find(g => g.id === id);
      const existingIndex = selectedGames.findIndex(g => g.id === id);
      
      if (existingIndex > -1) {
        selectedGames.splice(existingIndex, 1);
        showToast(`Removed ${game.title}`, 'info');
      } else {
        const totalSize = selectedGames.reduce((sum, g) => sum + g.size, 0) + game.size;
        if (totalSize > currentDrive.usable) {
          showToast('Not enough space on selected drive!', 'error');
          return;
        }
        selectedGames.push(game);
        showToast(`Added ${game.title}`, 'success');
      }
      
      renderGames();
      renderSelectedList();
      updateStorage();
    }

    // Render selected games list
    function renderSelectedList() {
      const list = document.getElementById('selected-list');
      const emptyMsg = document.getElementById('empty-message');
      const countEl = document.getElementById('selected-count');
      const clearBtn = document.getElementById('clear-btn');
      const sendBtn = document.getElementById('send-btn');
      
      countEl.textContent = selectedGames.length;
      clearBtn.disabled = selectedGames.length === 0;
      sendBtn.disabled = selectedGames.length === 0;
      
      if (selectedGames.length === 0) {
        list.innerHTML = '<p id="empty-message" class="text-white/30 text-sm text-center py-8">No games selected</p>';
        return;
      }
      
      list.innerHTML = selectedGames.map(game => `
        <div class="selected-item flex items-center justify-between p-2 bg-white/5 rounded border border-white/10">
          <div class="flex items-center gap-2">
            <span class="text-lg">${game.image}</span>
            <span class="text-sm truncate max-w-[120px]">${game.title}</span>
          </div>
          <div class="flex items-center gap-2">
            <span class="text-xs text-white/50">${game.size} GB</span>
            <button class="w-6 h-6 flex items-center justify-center hover:bg-white/10 rounded transition-all" onclick="toggleGame(${game.id})">
              <svg class="w-4 h-4 text-white/50 hover:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
              </svg>
            </button>
          </div>
        </div>
      `).join('');
    }

    // Update storage display
    function updateStorage() {
      const totalSize = selectedGames.reduce((sum, g) => sum + g.size, 0);
      const remaining = currentDrive.usable - totalSize;
      const percentage = (totalSize / currentDrive.usable) * 100;
      
      document.getElementById('storage-fill').style.width = `${Math.min(percentage, 100)}%`;
      document.getElementById('used-display').textContent = `${totalSize} GB`;
      document.getElementById('remaining-display').textContent = `${remaining} GB`;
      document.getElementById('total-size').textContent = `${totalSize} GB`;
      
      const remainingEl = document.getElementById('remaining-display');
      if (remaining < 50) {
        remainingEl.className = 'font-orbitron text-red-400';
      } else if (remaining < 200) {
        remainingEl.className = 'font-orbitron text-yellow-400';
      } else {
        remainingEl.className = 'font-orbitron text-green-400';
      }
    }

    // Show toast notification
    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      
      const colors = {
        success: 'bg-green-500/90',
        error: 'bg-red-500/90',
        info: 'bg-white/90 text-black'
      };
      
      toast.className = `toast ${colors[type]} px-4 py-2 rounded shadow-lg text-sm font-medium`;
      toast.textContent = message;
      container.appendChild(toast);
      
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.3s';
        setTimeout(() => toast.remove(), 300);
      }, 2000);
    }

    // Filter handlers
    document.getElementById('filters').addEventListener('click', (e) => {
      if (e.target.classList.contains('filter-btn')) {
        document.querySelectorAll('.filter-btn').forEach(btn => {
          btn.classList.remove('active', 'bg-white', 'text-black');
          btn.classList.add('bg-transparent', 'text-white');
        });
        e.target.classList.add('active', 'bg-white', 'text-black');
        e.target.classList.remove('bg-transparent', 'text-white');
        currentFilter = e.target.dataset.category;
        renderGames();
      }
    });

    // Drive selector handlers
    document.getElementById('drive-selector').addEventListener('click', (e) => {
      if (e.target.classList.contains('drive-btn')) {
        document.querySelectorAll('.drive-btn').forEach(btn => {
          btn.classList.remove('active', 'bg-white', 'text-black');
          btn.classList.add('bg-transparent', 'text-white');
        });
        e.target.classList.add('active', 'bg-white', 'text-black');
        e.target.classList.remove('bg-transparent', 'text-white');
        
        const size = parseInt(e.target.dataset.size);
        const usable = parseInt(e.target.dataset.usable);
        const label = e.target.textContent;
        
        currentDrive = { size, usable, label };
        document.getElementById('drive-display').textContent = label;
        document.getElementById('usable-display').textContent = `${usable} GB`;
        updateStorage();
      }
    });

    // Clear list handler
    document.getElementById('clear-btn').addEventListener('click', () => {
      selectedGames = [];
      renderGames();
      renderSelectedList();
      updateStorage();
      showToast('List cleared', 'info');
    });

    // Send to Messenger handler
    document.getElementById('send-btn').addEventListener('click', () => {
      if (selectedGames.length === 0) return;
      
      const totalSize = selectedGames.reduce((sum, g) => sum + g.size, 0);
      const gamesList = selectedGames.map(g => `• ${g.title} (${g.size} GB)`).join('\n');
      
      const message = `🎮 PC GAME DRIVE BUILD\n\n` +
        `📦 Drive: ${currentDrive.label} (${currentDrive.usable} GB usable)\n\n` +
        `SELECTED GAMES:\n${gamesList}\n\n` +
        `📊 TOTAL: ${totalSize} GB\n` +
        `💾 REMAINING: ${currentDrive.usable - totalSize} GB`;
      
      // Show preview modal
      const modal = document.createElement('div');
      modal.className = 'fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4';
      modal.innerHTML = `
        <div class="bg-neutral-900 border border-white/20 rounded-lg max-w-md w-full p-6">
          <h3 class="font-orbitron text-lg mb-4 flex items-center gap-2">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            Message Preview
          </h3>
          <pre class="bg-black/50 p-4 rounded text-xs text-white/80 whitespace-pre-wrap mb-4 max-h-64 overflow-auto">${message}</pre>
          <div class="flex gap-2">
            <button id="close-modal" class="flex-1 py-2 border border-white/20 rounded font-orbitron text-sm hover:bg-white/10 transition-all">CLOSE</button>
            <button id="copy-message" class="flex-1 py-2 bg-white text-black rounded font-orbitron text-sm hover:bg-white/90 transition-all">COPY MESSAGE</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
      
      modal.querySelector('#close-modal').addEventListener('click', () => modal.remove());
      modal.querySelector('#copy-message').addEventListener('click', () => {
        navigator.clipboard.writeText(message).then(() => {
          showToast('Message copied to clipboard!', 'success');
          modal.remove();
        });
      });
